name: Ygy Platform CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.trivy.outcome != 'cancelled'
        with:
          sarif_file: 'trivy-results.sarif'

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        app: [Ygy-app, sho3lah-app, mindpal-app]
    defaults:
      run:
        working-directory: ./${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.app }}/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Run lint
        run: npm run lint --if-present
      - name: Run type check
        run: |
          if npm run | grep -q " typecheck"; then
            npm run typecheck
          elif [ -f tsconfig.app.json ]; then
            npx tsc --noEmit -p tsconfig.app.json
          else
            npx tsc --noEmit
          fi
      - name: Run tests
        run: |
          if npm run | grep -q " test"; then
            npm run test -- --run
          else
            echo "No test script for ${{ matrix.app }}; skipping."
          fi
      - name: Build
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: security-scan
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-43059
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key-not-for-production
          ENVIRONMENT: testing
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: backend

  test-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./mobile_app
      - name: Analyze
        run: flutter analyze
        working-directory: ./mobile_app
      - name: Run tests
        run: flutter test --coverage
        working-directory: ./mobile_app
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./mobile_app/coverage/lcov.info
          flags: mobile

  build-and-push:
    needs: [test-frontend, test-backend, test-mobile]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    if: >-
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./backend
            image: ygy-api
          - context: ./Ygy-app
            image: ygy-frontend
          - context: ./sho3lah-app
            image: ygy-sho3lah
          - context: ./mindpal-app
            image: ygy-mindpal
          - context: ./ml-models
            image: ygy-ml-models
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets[format('{0}', 'STAGING_KUBE_CONFIG')] }}
      - name: Deploy to staging
        run: |
          kubectl set image deployment/ygy-api      api=${{ env.REGISTRY }}/ygy-api:${{ env.IMAGE_TAG }}      -n staging
          kubectl set image deployment/ygy-frontend  frontend=${{ env.REGISTRY }}/ygy-frontend:${{ env.IMAGE_TAG }}  -n staging
          kubectl set image deployment/ygy-sho3lah   sho3lah=${{ env.REGISTRY }}/ygy-sho3lah:${{ env.IMAGE_TAG }}   -n staging
          kubectl set image deployment/ygy-mindpal   mindpal=${{ env.REGISTRY }}/ygy-mindpal:${{ env.IMAGE_TAG }}    -n staging
          kubectl rollout status deployment/ygy-api      --timeout=300s -n staging
          kubectl rollout status deployment/ygy-frontend --timeout=300s -n staging
          kubectl rollout status deployment/ygy-sho3lah  --timeout=300s -n staging
          kubectl rollout status deployment/ygy-mindpal  --timeout=300s -n staging
      - name: Smoke test staging
        env:
          STAGING_URL: ${{ secrets[format('{0}', 'STAGING_URL')] }}
        run: curl --fail --retry 5 --retry-delay 10 --retry-connrefused "${STAGING_URL}/health"
      - name: Rollback staging on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/ygy-api       -n staging
          kubectl rollout undo deployment/ygy-frontend  -n staging
          kubectl rollout undo deployment/ygy-sho3lah   -n staging
          kubectl rollout undo deployment/ygy-mindpal   -n staging

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production')
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets[format('{0}', 'KUBE_CONFIG')] }}
      - name: Deploy to production
        run: |
          kubectl set image deployment/ygy-api      api=${{ env.REGISTRY }}/ygy-api:${{ env.IMAGE_TAG }}      -n production
          kubectl set image deployment/ygy-frontend  frontend=${{ env.REGISTRY }}/ygy-frontend:${{ env.IMAGE_TAG }}  -n production
          kubectl set image deployment/ygy-sho3lah   sho3lah=${{ env.REGISTRY }}/ygy-sho3lah:${{ env.IMAGE_TAG }}   -n production
          kubectl set image deployment/ygy-mindpal   mindpal=${{ env.REGISTRY }}/ygy-mindpal:${{ env.IMAGE_TAG }}    -n production
          kubectl set image deployment/ygy-ml-models ml-models=${{ env.REGISTRY }}/ygy-ml-models:${{ env.IMAGE_TAG }} -n production
          kubectl rollout status deployment/ygy-api      --timeout=300s -n production
          kubectl rollout status deployment/ygy-frontend --timeout=300s -n production
          kubectl rollout status deployment/ygy-sho3lah  --timeout=300s -n production
          kubectl rollout status deployment/ygy-mindpal  --timeout=300s -n production
          kubectl rollout status deployment/ygy-ml-models --timeout=300s -n production
      - name: Smoke test production
        env:
          PRODUCTION_URL: ${{ secrets[format('{0}', 'PRODUCTION_URL')] }}
        run: curl --fail --retry 5 --retry-delay 10 --retry-connrefused "${PRODUCTION_URL}/health"
      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/ygy-api       -n production
          kubectl rollout undo deployment/ygy-frontend  -n production
          kubectl rollout undo deployment/ygy-sho3lah   -n production
          kubectl rollout undo deployment/ygy-mindpal   -n production
          kubectl rollout undo deployment/ygy-ml-models -n production
      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": ":x: Production deploy failed for <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.sha }}> by ${{ github.actor }}. Rollback triggered."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets[format('{0}', 'SLACK_WEBHOOK_URL')] }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK




