# Ygy - Unified Brain Training Platform
# Complete multi-service orchestration for production deployment

services:
  # NGINX Reverse Proxy - Main Entry Point
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - api
      - analytics
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Unified React Frontend - Ygy Web App
  frontend:
    build:
      context: ./lumosity-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://api:8000
      - REACT_APP_WS_URL=ws://websocket:8001
      - REACT_APP_ANALYTICS_URL=http://analytics:8080
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
      websocket:
        condition: service_started
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend - Core API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ygy:password@db:5432/ygy
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://frontend:80,http://nginx:80,http://sho3lah:80,http://mindpal:80
      - ML_MODEL_PATH=/app/models
    volumes:
      - ./backend:/app
      - ml-models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  # WebSocket Server - Real-time Features
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - WS_PORT=8001
    depends_on:
      - redis
    networks:
      - ygy-network
    restart: unless-stopped
    command: python websocket_server.py

  # PHP Analytics Service
  analytics:
    build:
      context: ./backend
      dockerfile: Dockerfile.php
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=ygy
      - DB_PASS=password
      - DB_NAME=ygy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ygy
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ygy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ygy -d ygy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Sho3lah - Arabic Frontend
  sho3lah:
    build:
      context: ./sho3lah-app
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped

  # MindPal - English Frontend
  mindpal:
    build:
      context: ./mindpal-app
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped

  # Celery Worker - Background Tasks
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://ygy:password@db:5432/ygy
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - ml-models:/app/models
    depends_on:
      - redis
      - db
      - api
    networks:
      - ygy-network
    restart: unless-stopped

  # Flower - Celery Monitoring
  flower:
    image: mher/flower:latest
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379
      - FLOWER_BASIC_AUTH=admin:ygy2024
    depends_on:
      - redis
      - celery
    networks:
      - ygy-network
    restart: unless-stopped

  # Node Exporter - Host metrics
  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ygy-network
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://ygy:password@db:5432/ygy?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exp:latest
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - ygy-network
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ygy-network
    restart: unless-stopped

  # Grafana - Dashboard & Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ygy2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ygy-network
    restart: unless-stopped

  # ========================= KAFKA STREAMING ========================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    ports:
      - "2181:2181"
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ygy-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 6 --topic game-events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 4 --topic telemetry.engine.events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 2 --topic analytics-results
        echo "Kafka topics created successfully."
    restart: on-failure

  # Telemetry Ingestion API (Node/Fastify → Kafka)
  ingestion-api:
    build:
      context: ./services/ingestion-api
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ML Model Trainer — runs once on startup, writes models to shared volume
  ml-trainer:
    build:
      context: ./ml-models
      dockerfile: Dockerfile
    environment:
      - MODEL_PATH=/models
      - PYTHONUNBUFFERED=1
    volumes:
      - ml-models:/models
    networks:
      - ygy-network
    restart: on-failure

  # Data Pipeline (Python/aiokafka consumer → PostgreSQL)
  data-pipeline:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://ygy:password@db:5432/ygy
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - ygy-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ml-models:
  prometheus_data:
  grafana_data:
  nginx_logs:
  zookeeper_data:
  kafka_data:

networks:
  ygy-network:
    driver: bridge