services:
  # Frontend React App
  frontend:
    build:
      context: ./Ygy-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ygy-network

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - REDIS_URL=${DOCKER_REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ygy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ygy -d ygy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ygy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PHP Analytics Service
  analytics:
    build:
      context: ./backend
      dockerfile: Dockerfile.php
    ports:
      - "8080:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ygy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker for Background Tasks
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A api worker --loglevel=info
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - REDIS_URL=${DOCKER_REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - db
    networks:
      - ygy-network
    volumes:
      - ./backend:/app

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - REDIS_URL=${DOCKER_REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - db
    networks:
      - ygy-network
    volumes:
      - ./backend:/app

  # WebSocket realtime server
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn websocket_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - REDIS_URL=${DOCKER_REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Flower for Celery Monitoring
  flower:
    image: mher/flower:latest
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${DOCKER_REDIS_URL}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH}
    depends_on:
      - redis
      - celery
    networks:
      - ygy-network

volumes:
  postgres_data:
  redis_data:

networks:
  ygy-network:
    driver: bridge

