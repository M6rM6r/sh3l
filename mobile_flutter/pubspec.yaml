name: ygy_brain_training
description: Ygy - Unified Brain Training Platform (Arabic + English)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  google_fonts: ^6.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.1.0
  webview_flutter: ^4.4.2

flutter:
  uses-material-design: true
  generate: true
  
flutter_intl:
  enabled: true
  class_name: S
  arb_dir: lib/l10n
  output_dir: lib/l10n
  use_deferred_loading: false
